<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="theme-color" content="#F9FAFB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Бізнес Оцінка">
  <link rel="manifest" href="manifest.json">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <title>Бізнес Варіанти</title>
  <style>
    /* =========================================
       Базові налаштування та змінні (Telegram Ready)
    ========================================= */
    :root {
      --bg-color: var(--tg-theme-secondary-bg-color, #F9FAFB);
      --card-bg: var(--tg-theme-bg-color, #FFFFFF);
      --text-main: var(--tg-theme-text-color, #1F2937);
      --text-muted: var(--tg-theme-hint-color, #6B7280);
      --accent-blue: var(--tg-theme-button-color, #3B82F6);
      --accent-text: var(--tg-theme-button-text-color, #FFFFFF);
      --border-color: var(--tg-theme-hint-color, #E5E7EB);
      --nav-height: 65px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* =========================================
       Макет та Хедер
    ========================================= */
    header {
      background-color: var(--card-bg);
      padding: env(safe-area-inset-top) 20px 16px;
      padding-top: calc(env(safe-area-inset-top) + 20px);
      text-align: center;
      border-bottom: 1px solid rgba(107, 114, 128, 0.2);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 1.25rem; font-weight: 700; color: var(--text-main); }

    main {
      padding: 20px 20px calc(var(--nav-height) + env(safe-area-inset-bottom) + 20px);
      max-width: 600px;
      margin: 0 auto;
    }

    /* =========================================
       Анімації та Вкладки
    ========================================= */
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* =========================================
       Форма введення
    ========================================= */
    .input-group { display: flex; gap: 10px; margin-bottom: 24px; }

    input[type="text"] {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid rgba(107, 114, 128, 0.3);
      border-radius: 12px;
      font-size: 1rem;
      background: var(--card-bg);
      color: var(--text-main);
      outline: none;
    }

    input[type="text"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus { border-color: var(--accent-blue); }

    .btn-add {
      background-color: var(--accent-blue);
      color: var(--accent-text);
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    .btn-add:active { transform: scale(0.95); opacity: 0.8; }

    /* =========================================
       Список карток
    ========================================= */
    .list { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(107, 114, 128, 0.15);
      gap: 15px;
    }

    .card-info { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-text { font-size: 1rem; font-weight: 500; word-break: break-word; }
    
    .card-actions { display: flex; gap: 12px; }
    .action-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; padding: 0;}
    .action-btn:active { opacity: 1; transform: scale(0.9); }

    .card-controls { display: flex; align-items: center; gap: 12px; }

    .badge-count { font-size: 1.1rem; font-weight: 700; color: var(--text-main); min-width: 24px; text-align: center; }

    .btn-vote {
      background-color: rgba(59, 130, 246, 0.1);
      color: var(--accent-blue);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .btn-vote:active { transform: scale(0.85); background-color: var(--accent-blue); color: var(--accent-text); }

    .empty-state { text-align: center; color: var(--text-muted); margin-top: 40px; font-size: 0.95rem; }

    /* =========================================
       Нижня панель навігації
    ========================================= */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: calc(var(--nav-height) + env(safe-area-inset-bottom));
      background-color: var(--card-bg);
      border-top: 1px solid rgba(107, 114, 128, 0.2);
      display: flex;
      justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      gap: 4px;
      cursor: pointer;
    }

    .nav-item svg { fill: currentColor; width: 24px; height: 24px; }
    .nav-item.active { color: var(--accent-blue); }
  </style>
</head>
<body>

  <header>
    <h1 id="header-title">Варіанти для бізнесу</h1>
  </header>

  <main>
    <section id="tab-options" class="tab-content active">
      <div class="input-group">
        <input type="text" id="option-input" placeholder="Назва нового варіанту..." autocomplete="off">
        <button class="btn-add" onclick="addOption()">Додати</button>
      </div>
      <div id="options-list" class="list"></div>
    </section>

    <section id="tab-rating" class="tab-content">
      <div id="rating-list" class="list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('options')" id="nav-options">
      <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      <span>Варіанти</span>
    </div>
    <div class="nav-item" onclick="switchTab('rating')" id="nav-rating">
      <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
      <span>Рейтинг</span>
    </div>
  </nav>

  <script>
    // --- 1. Ініціалізація Telegram Web App ---
    const tg = window.Telegram.WebApp;
    tg.ready(); 
    tg.expand(); // Розгортаємо додаток на весь екран

    // --- Локальні дані ---
    let businessOptions = JSON.parse(localStorage.getItem('business_options')) || [];
    let editingId = null; // Змінна для збереження ID варіанту, який редагується

    const saveToLocalStorage = () => {
      localStorage.setItem('business_options', JSON.stringify(businessOptions));
    };

    // --- 3. Система Пуш-повідомлень (Notification API) ---
    const requestNotificationPermission = () => {
      if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
      }
    };

    const sendPushNotification = (title, body) => {
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, {
          body: body,
          icon: 'icon-192.png' // шлях до іконки (якщо є)
        });
        
        // Вібрація (працює на мобільних пристроях)
        if ("vibrate" in navigator) navigator.vibrate(200);
      }
    };

    // --- Функціонал CRUD ---
    const addOption = () => {
      const input = document.getElementById('option-input');
      const text = input.value.trim();
      if (text === '') return;

      if (editingId) {
        // Редагування існуючого
        const option = businessOptions.find(opt => opt.id === editingId);
        if (option) option.text = text;
        editingId = null;
        document.querySelector('.btn-add').innerText = 'Додати';
      } else {
        // Додавання нового
        businessOptions.push({
          id: Date.now().toString(),
          text: text,
          votes: 0,
          createdAt: Date.now()
        });
      }

      saveToLocalStorage();
      input.value = '';
      refreshUI();
      requestNotificationPermission(); // Запитуємо дозвіл при першій активності
    };

    document.getElementById('option-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addOption();
    });

    // --- 2. Редагування та Видалення ---
    const editOption = (id) => {
      const option = businessOptions.find(opt => opt.id === id);
      if (option) {
        const input = document.getElementById('option-input');
        input.value = option.text;
        input.focus();
        editingId = id;
        document.querySelector('.btn-add').innerText = 'Зберегти';
        switchTab('options'); // Перемикаємось на вкладку вводу, якщо були в рейтингу
      }
    };

    const deleteOption = (id) => {
      if(confirm('Ви впевнені, що хочете видалити цей варіант?')) {
        businessOptions = businessOptions.filter(opt => opt.id !== id);
        saveToLocalStorage();
        refreshUI();
      }
    };

    // --- Голосування ---
    const vote = (id) => {
      const option = businessOptions.find(opt => opt.id === id);
      if (option) {
        option.votes += 1;
        saveToLocalStorage();
        
        // Логіка пуш-повідомлень: сповіщаємо, якщо варіант набирає кратну 5 кількість голосів (5, 10, 15...)
        if (option.votes > 0 && option.votes % 5 === 0) {
          sendPushNotification("🔥 Новий рекорд!", `Варіант "${option.text}" вже має ${option.votes} голосів!`);
        }

        refreshUI();
      }
    };

    // --- Рендеринг інтерфейсу ---
    const createCardHTML = (option) => {
      return `
        <div class="card">
          <div class="card-info">
            <div class="card-text">${option.text}</div>
            <div class="card-actions">
              <button class="action-btn" onclick="editOption('${option.id}')" title="Редагувати">✏️</button>
              <button class="action-btn" onclick="deleteOption('${option.id}')" title="Видалити">🗑️</button>
            </div>
          </div>
          <div class="card-controls">
            <span class="badge-count" id="vote-count-${option.id}">${option.votes}</span>
            <button class="btn-vote" onclick="vote('${option.id}')">+</button>
          </div>
        </div>
      `;
    };

    const renderOptions = () => {
      const listElement = document.getElementById('options-list');
      if (businessOptions.length === 0) {
        listElement.innerHTML = '<div class="empty-state">Поки немає жодного варіанту. Додайте перший!</div>';
        return;
      }
      const sortedByTime = [...businessOptions].sort((a, b) => b.createdAt - a.createdAt); // Нові зверху
      listElement.innerHTML = sortedByTime.map(createCardHTML).join('');
    };

    const renderRating = () => {
      const listElement = document.getElementById('rating-list');
      if (businessOptions.length === 0) {
        listElement.innerHTML = '<div class="empty-state">Немає даних для рейтингу.</div>';
        return;
      }
      const sortedByVotes = [...businessOptions].sort((a, b) => b.votes !== a.votes ? b.votes - a.votes : a.createdAt - b.createdAt);
      listElement.innerHTML = sortedByVotes.map(createCardHTML).join('');
    };

    const refreshUI = () => {
      const activeTab = document.querySelector('.tab-content.active').id;
      if (activeTab === 'tab-options') renderOptions();
      else renderRating();
    };

    // --- Перемикання вкладок ---
    const switchTab = (tabName) => {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`nav-${tabName}`).classList.add('active');

      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');

      const headerTitle = document.getElementById('header-title');
      if (tabName === 'options') {
        headerTitle.innerText = 'Варіанти для бізнесу';
        renderOptions();
      } else {
        headerTitle.innerText = 'Рейтинг варіантів';
        renderRating();
      }
    };

    // Ініціалізація
    renderOptions();
  </script>
</body>
</html>
